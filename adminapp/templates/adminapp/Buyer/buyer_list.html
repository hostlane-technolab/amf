<!DOCTYPE html>
<html>
<head>
    <title>Buyer List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
    <h2 class="mb-4">Buyer List</h2>
    <a href="{% url 'adminapp:buyer_create' %}" class="btn btn-primary mb-3">+ Add Buyer</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Country</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for buyer in buyers %}
            <tr>
                <td>{{ buyer.name }}</td>
                <td>{{ buyer.country }}</td>
                <td>{{ buyer.email }}</td>
                <td>{{ buyer.phone }}</td>
                <td>
                    {% if buyer.is_active %}
                        <span class="badge bg-success">Yes</span>
                    {% else %}
                        <span class="badge bg-danger">No</span>
                    {% endif %}
                </td>
                <td>
                    <a href="{% url 'adminapp:buyer_update' buyer.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'adminapp:buyer_delete' buyer.id %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="6" class="text-center">No buyers found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
